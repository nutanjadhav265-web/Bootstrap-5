<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
     integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div class="container">
      <div class="row">
        <div class="col-md-4"> 
          <div class="card bg-black">
            <img src="/bootstrap card/img3.jpg" alt="" class="card-img-top">
           <div class="card-body">
           <h5 class="card-title text-warning">DONUTS</h5>
           <p class="card-text text-light">Donuts are soft, sweet, ring-shaped pastries that are usually 
             topped with chocolate, sugar, or colorful sprinkles." 🍩</p>
             <button type="button" class="btn btn-primary">buy now</button>
      </div>
    </div>                 
   </div>
<div class="col-md-4"> 
          <div class="card bg-black">
            <img src="/bootstrap card/img4.jpg" class="card-img-top">
           <div class="card-body">
           <h5 class="card-title text-warning">ICE CREAM</h5>
           <p class="card-text text-light">Ice cream is a sweet, frozen dessert made from milk, cream, sugar, 
            and flavoring ingredients.</p>
             <button type="button" class="btn btn-primary">buy now</button>
      </div>
    </div>                 
   </div>

<div class="col-md-4"> 
          <div class="card bg-black">
            <img src="/bootstrap card/img5.jpg" class="card-img-top">
           <div class="card-body">
           <h5 class="card-title text-warning">COLD DRINKS</h5>       
               <p class="card-text text-light">Cold drinks, good vibes, and great moments."</p>
             <button type="button" class="btn btn-primary">buy now</button>
      </div>
    </div>                 
   </div>



   </div>
  </div>
 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" ></script>
  
  </body>
</html>
